name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            figby-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('figby-rs/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --manifest-path figby-rs/Cargo.toml -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path figby-rs/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path figby-rs/Cargo.toml
