canvas_fullscreen:                                 #nf-cod-screen_full  ALTS 󰘖 nf-md-arrow_expand   ALTS:󰁌 nf-md-arrow_expand_all   󰘕 nf-md-arrow_collapse 󰁄 nf-md-arrow_collapse_all nf-fa-arrows_alt

# ── Brush ─────────────────────────────────────────
