# Figby TUI Iconset — Nerd Font icon names
# Maps every UI element from the todo spec to a Nerd Font glyph.
# Loaded at TUI startup; key = element id, value = nf icon name.

# ── Modes ──────────────────────────────────────────
mode_font_editor: 󰛖                                 # nf-fa-font changed to nf-md-format_font for now
mode_image_editor:                                 # nf-fa-picture_o
mode_ascii_preview:                                # nf-fa-terminal possible alts:  nf-dev-terminal or  nf-cod-terminal or  nf-cod-terminal_bash

