# Figby TUI Iconset — Nerd Font icon names
# Maps every UI element from the todo spec to a Nerd Font glyph.
# Loaded at TUI startup; key = element id, value = nf icon name.

# ── Modes ──────────────────────────────────────────
mode_font_editor: 󰛖                                 # nf-fa-font changed to nf-md-format_font for now
mode_image_editor:                                 # nf-fa-picture_o
mode_ascii_preview:                                # nf-fa-terminal possible alts:  nf-dev-terminal or  nf-cod-terminal or  nf-cod-terminal_bash

# ── Tools ──────────────────────────────────────────
tool_brush:                                        # nf-fa-paint_brush  alt:  nf-oct-paintbrush
tool_eraser:                                       # nf-fa-eraser       󰇾 nf-md-eraser  󰙂 nf-md-eraser_variant
tool_line: 󰕞                                        # nf-md-vector_line
tool_fill:                                         # nf-fa-fill alts:  󰁷 nf-md-basket_fill  # nf-fa-paint_bucket alts:  nf-fa-fill  nf-cod-paintcan  nf-fa-fill-drop 󰉦 nd-md-format_color_fill
tool_flood_fill: nf-fa-paint_bucket
tool_marquee:                                      # nf-fa-arrows alts: 
tool_lasso: 󰼃                                       # nf-md-lasso alts:  󰆣 nf-fa-crosshairs
tool_circle:                                       #nf-oct-circle    alts:  nf-fa-circle_o  nf-fa-circle_o  nf-fa-circle_thin    nf-cod-circle_large   nf-cod-circle  nf-cod-circle_filled  nf-cod-circle_small
tool_polygon: 󰙞                                     # nf-md-shape-polygon-plus ALTS: 󱡖 nf-md-vector_polygon_variant 󰕠 nf-md-vector_polygon    nf-fa-draw_polygon
tool_eyedropper:                                   # nf-fa-eyedropper  ALTS: 󰈊 nf-md-eyedropper 󰈋 nf-md-eyedropper_variant 󱏜 󱏝  󱏟 
tool_spray:                                        # nf-fa-spray_can   nf-fa-spray_can_sparkles   alts: nf-weather-sprinkle
tool_text:                                         # nf-fa-font ALTS:  nf-seti-font  󰛖 nf-md-format_font 󰧳  󰧴 
tool_pencil:                                       # nf-fa-pencil  ALTS:  nf-fa-pencil_square  󰏫 nf-md-pencil 󰏬 nf-md-pencil_box 󰛿 nf-md-pencil_circle 󰏮 nf-md-pencil_lock 󰏭 nf-md-pencil_box_outline 󰝶 nf-md-pencil_circle_outline 󱅅 nf-md-pencil_box_multiple_outline   nf-oct-pencil 󰙈 nf-md-grease_pencil 󰙏 nf-md-lead_pencil 󱞇 nf-md-progress_pencil 

# ── Cursor / Selection ─────────────────────────────
cursor_default:                                    # nf-fa-arrow_pointer alts: 󰆿  nf-fa-arrows  nf-arrows_alt  nf-oct-arrow_up_left  󰇀 nf-md-cursor_default 󰆽 nf-md-cursor_pointer 󰳽 nf-md-cursor_default_click 󰳾 nf-md-cursor_default_click_outline
cursor_crosshair:                                  # nf-fa-crosshairs 󰆤 nf-md-crosshairs_gps  nf-fa-location_crosshairs 󰆣 nf-md-crosshairs 󰽅 nf-md-crosshairs_off 󱄶 nf-md-crosshairs_question
cursor_text:                                       # nf-fa-i_cursor  ALTS 󰗧 nf-md-cursor_text 
cursor_move: 󰆾 # nf-md-cursor_move   nf-fa-hand_o_up  nf-fa-arrows 󰆾
cursor_resize_ns:                                  # nf-fa-arrows_v
cursor_resize_ew:                                  # nf-fa-arrows_h

# ── Canvas ─────────────────────────────────────────
canvas_grid:                                       # nf-fa-th   nf-fa-th_large  󰝘 nf-md-grid_large 󰋁 nf-md-grid
canvas_grid_off: 󰋂                                  # nf-md-grid_off
canvas_zoom_in:                                    # nf-fa-search_plus
canvas_zoom_out:                                   # nf-fa-search_minus
canvas_zoom_reset:󱎱                                 # fa-md-home_search_outline                                 # nf-fa-search 󰹓 
