# Default Figby TUI theme (TachyonFX-inspired dark theme)
# Each value is a 6-digit RGB hex color with # prefix.
# Omitted fields fall back to built-in defaults.

toolbox:
  bg: "#0d0d1a"
  fg: "#d4d4e8"
  selected: "#00d4ff"

canvas:
  grid: "#1a1a2e"
  cursor: "#00d4ff"
  selection: "#00344d"
  edge: "#1a1a2e"
  text_block: "#ff0099"

palette:
  border: "#1a1a2e"
  active_target: "#00d4ff"
  swatch_indicator: "#d4d4e8"
  cell_bg: "#12121f"

statusbar:
  mode_font: "#00d4ff"
  mode_image: "#ff0099"
  mode_ascii: "#ffaa00"
  separator: "#555577"
  label: "#8888aa"

menu:
  bg: "#0d0d1a"
  fg: "#d4d4e8"
  highlight: "#00d4ff"
  dim: "#555577"
  dropdown_bg: "#12121f"

dialog:
  border_success: "#00ff87"
  border_path: "#00d4ff"
  label: "#d4d4e8"
  meta: "#8888aa"
  error: "#ff0044"
  highlight: "#ff0099"
  selected_bg: "#00344d"

general:
  primary: "#00d4ff"
  secondary: "#ff0099"
  success: "#00ff87"
  error: "#ff0044"
  warning: "#ffaa00"
